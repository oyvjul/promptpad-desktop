<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PromptPad</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="line-gutter"></div>
    <div id="highlight-overlay"></div>
    <textarea
      placeholder="Start typing markdown..."
      autofocus
      spellcheck="false"
    ></textarea>
    <pre id="ascii-overlay"></pre>
    <script src="placeholder.js"></script>

    <script>
      const textarea = document.querySelector("textarea");
      const highlightOverlay = document.getElementById("highlight-overlay");
      const lineGutter = document.getElementById("line-gutter");

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function highlightMarkdown(text) {
        const lines = text.split("\n");
        return lines
          .map((rawLine) => {
            let line = escapeHtml(rawLine);
            const placeholders = [];
            function ph(html) {
              const token = `\x00${placeholders.length}\x00`;
              placeholders.push(html);
              return token;
            }

            // Inline code
            line = line.replace(/(`+)(.*?)\1/g, (m, ticks, content) =>
              ph(
                `<span class="md-dim">${ticks}</span><span class="md-code">${content}</span><span class="md-dim">${ticks}</span>`,
              ),
            );

            // Links [text](url)
            line = line.replace(/\[([^\]]*)\]\(([^)]*)\)/g, (m, text, url) =>
              ph(
                `<span class="md-dim">[</span><span class="md-link-text">${text}</span><span class="md-dim">](</span><span class="md-link-url">${url}</span><span class="md-dim">)</span>`,
              ),
            );

            // Bold **text** or __text__
            line = line.replace(/(\*\*|__)(.+?)\1/g, (m, marker, content) =>
              ph(
                `<span class="md-dim">${marker}</span><span class="md-bold">${content}</span><span class="md-dim">${marker}</span>`,
              ),
            );

            // Italic *text* or _text_
            line = line.replace(/(\*|_)(.+?)\1/g, (m, marker, content) =>
              ph(
                `<span class="md-dim">${marker}</span><span class="md-italic">${content}</span><span class="md-dim">${marker}</span>`,
              ),
            );

            // Restore placeholders
            line = line.replace(/\x00(\d+)\x00/g, (m, i) => placeholders[i]);

            // Block-level patterns (check against raw line)
            // Horizontal rule
            if (/^(\s*[-*_]\s*){3,}$/.test(rawLine)) {
              return `<span class="md-hr">${line}</span>`;
            }
            // Headers
            const headerMatch = rawLine.match(/^(#{1,6})\s/);
            if (headerMatch) {
              const level = headerMatch[1].length;
              const marker = escapeHtml(headerMatch[1]) + " ";
              const rest = line.slice(marker.length);
              return `<span class="md-h-marker">${marker}</span><span class="md-h${level}">${rest}</span>`;
            }
            // Blockquote
            if (rawLine.match(/^>\s?/)) {
              const markerMatch = line.match(/^(&gt;)\s?/);
              if (markerMatch) {
                const marker = markerMatch[0];
                const rest = line.slice(marker.length);
                return `<span class="md-blockquote-marker">${marker}</span><span class="md-blockquote-text">${rest}</span>`;
              }
            }
            // Unordered list
            const ulMatch = rawLine.match(/^(\s*[-*+])\s/);
            if (ulMatch) {
              const markerLen = escapeHtml(ulMatch[1]).length + 1;
              return `<span class="md-list-marker">${line.slice(0, markerLen)}</span>${line.slice(markerLen)}`;
            }
            // Ordered list
            const olMatch = rawLine.match(/^(\s*\d+\.)\s/);
            if (olMatch) {
              const markerLen = olMatch[1].length + 1;
              return `<span class="md-list-marker">${line.slice(0, markerLen)}</span>${line.slice(markerLen)}`;
            }

            return line;
          })
          .join("\n");
      }

      function updateHighlight() {
        highlightOverlay.innerHTML = highlightMarkdown(textarea.value) + "\n";
      }

      function getCurrentLine() {
        return textarea.value.substring(0, textarea.selectionStart).split("\n")
          .length;
      }

      let _prevLineCount = 0;
      let _prevCurrentLine = 0;

      function updateLineNumbers() {
        const lineCount = textarea.value.split("\n").length;
        const currentLine = getCurrentLine();

        const digits = Math.max(2, String(lineCount).length);
        document.documentElement.style.setProperty(
          "--gutter-width",
          digits * 9 + 20 + "px",
        );

        if (lineCount !== _prevLineCount) {
          let html = "";
          for (let i = 1; i <= lineCount; i++) {
            const cls =
              i === currentLine ? "line-number active" : "line-number";
            html += `<span class="${cls}">${i}</span>`;
          }
          lineGutter.innerHTML = html;
          _prevLineCount = lineCount;
        } else if (currentLine !== _prevCurrentLine) {
          if (_prevCurrentLine > 0 && lineGutter.children[_prevCurrentLine - 1])
            lineGutter.children[_prevCurrentLine - 1].classList.remove(
              "active",
            );
          if (lineGutter.children[currentLine - 1])
            lineGutter.children[currentLine - 1].classList.add("active");
        }
        _prevCurrentLine = currentLine;
      }

      textarea.addEventListener("input", () => {
        updatePlaceholderVisibility(textarea.value.length > 0);
        updateHighlight();
        updateLineNumbers();
      });

      textarea.addEventListener("scroll", () => {
        highlightOverlay.scrollTop = textarea.scrollTop;
        highlightOverlay.scrollLeft = textarea.scrollLeft;
        lineGutter.scrollTop = textarea.scrollTop;
      });

      updateHighlight();
      updateLineNumbers();

      document.addEventListener("selectionchange", () => {
        if (document.activeElement === textarea) {
          updateLineNumbers();
        }
      });

      textarea.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          if (e.shiftKey) {
            const start = textarea.selectionStart;
            const beforeCursor = textarea.value.substring(0, start);
            const lineStart = beforeCursor.lastIndexOf("\n") + 1;
            const linePrefix = textarea.value.substring(lineStart, start);
            if (linePrefix.match(/^ {1,2}/)) {
              const spaces = linePrefix.match(/^ {1,2}/)[0].length;
              textarea.selectionStart = lineStart;
              textarea.selectionEnd = lineStart + spaces;
              document.execCommand("delete", false);
            }
          } else {
            document.execCommand("insertText", false, "  ");
          }
        }
      });

      let lastEscTime = 0;
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          const now = Date.now();
          if (now - lastEscTime < 500) {
            window.electronAPI.hideApp();
          }
          lastEscTime = now;
        }
      });
    </script>
  </body>
</html>
