<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PromptPad</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        background: #1e1e1e;
      }
      textarea {
        width: 100%;
        height: 100%;
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
        font-size: 14px;
        line-height: 1.6;
        padding: 16px;
        border-color: #1e1e1e;
        outline: none;
        resize: none;
      }
      textarea::placeholder {
        color: #555;
      }
    </style>
  </head>
  <body>
    <textarea
      placeholder="Start typing markdown..."
      autofocus
      spellcheck="false"
    ></textarea>

    <script>
      let lastEscTime = 0;
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          const now = Date.now();
          if (now - lastEscTime < 500) {
            window.electronAPI.hideApp();
          }
          lastEscTime = now;
        }
      });
    </script>
  </body>
</html>
